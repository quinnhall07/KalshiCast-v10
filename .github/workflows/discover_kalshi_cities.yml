name: Discover Kalshi City Codes
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Discover Kalshi city codes
        run: python scripts/discover_kalshi_cities.py