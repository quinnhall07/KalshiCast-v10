name: Market Open Pipeline
on:
  schedule:
    - cron: '0 14 * * *'  # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      live:
        description: 'Run in live mode (submit real orders)'
        required: false
        default: 'false'

env:
  WALLET_DIR: /home/runner/oracle_wallet

jobs:
  market_open:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e

      - name: Configure Oracle wallet
        run: |
          if [ -z "$ORACLE_WALLET_B64" ]; then
            echo "::warning::ORACLE_WALLET_B64 secret is not set — skipping wallet configuration"
            exit 0
          fi
          mkdir -p "$WALLET_DIR"
          echo "$ORACLE_WALLET_B64" | base64 -d > "$WALLET_DIR/ewallet.pem"
        env:
          ORACLE_WALLET_B64: ${{ secrets.ORACLE_WALLET_B64 }}

      - name: Run market_open pipeline
        run: |
          if [ "${{ github.event.inputs.live }}" = "true" ]; then
            python -m kalshicast market_open --live
          else
            python -m kalshicast market_open
          fi
        env:
          ORACLE_WALLET_DIR: /home/runner/oracle_wallet
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}

      - name: Log Failure to Database
        if: failure() || cancelled()
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
        run: |
          python scripts/log_gh_failure.py "${{ github.workflow }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
