name: Health Check
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

env:
  WALLET_DIR: /home/runner/oracle_wallet

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Oracle wallet
        run: |
            if [ -z "$ORACLE_WALLET_B64" ]; then
              echo "::warning::ORACLE_WALLET_B64 secret is not set — skipping wallet configuration"
              exit 0
            fi
            mkdir -p "$WALLET_DIR"
            # Decode directly to the file format your Python script expects.
            # Change "ewallet.pem" to "ewallet.p12" below if your python script was updated to look for .p12
            echo "$ORACLE_WALLET_B64" | base64 -d > "$WALLET_DIR/ewallet.pem"
          env:
            ORACLE_WALLET_B64: ${{ secrets.ORACLE_WALLET_B64 }}

      - name: Run health check
        run: python -m kalshicast health
        env:
          ORACLE_WALLET_DIR: /home/runner/oracle_wallet
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
