name: Health Check
on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Oracle wallet
        run: |
          mkdir -p $HOME/oracle_wallet
          echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 -d > $HOME/oracle_wallet/wallet.zip
          cd $HOME/oracle_wallet && unzip -o wallet.zip
        env:
          ORACLE_WALLET_B64: ${{ secrets.ORACLE_WALLET_B64 }}

      - name: Run health check
        run: python -m kalshicast health
        env:
          ORACLE_WALLET_DIR: ${{ runner.temp }}/oracle_wallet
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
