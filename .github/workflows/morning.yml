name: Morning Pipeline
on:
  schedule:
    - cron: '0 */4 * * *'  
  workflow_dispatch:

env:
  WALLET_DIR: /home/runner/oracle_wallet

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e

      - name: Configure Oracle wallet
        run: |
          if [ -z "$ORACLE_WALLET_B64" ]; then
            echo "::warning::ORACLE_WALLET_B64 secret is not set — skipping wallet configuration"
            exit 0
          fi
          mkdir -p "$WALLET_DIR"
          echo "$ORACLE_WALLET_B64" | base64 -d > "$WALLET_DIR/ewallet.pem"
        env:
          ORACLE_WALLET_B64: ${{ secrets.ORACLE_WALLET_B64 }}

      - name: Run morning pipeline
        run: python -m kalshicast morning
        env:
          # Database Credentials
          ORACLE_WALLET_DIR: /home/runner/oracle_wallet
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          
          # Weather API Keys (Add these lines!)
          VISUALCROSSING_KEY: ${{ secrets.VISUALCROSSING_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}

      - name: Log Failure to Database
        if: failure()
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
        run: |
          python scripts/log_gh_failure.py "${{ github.workflow }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
